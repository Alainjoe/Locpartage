services:
  postgres:
    image: postgres:16-alpine
    container_name: locpartage-pg
    environment:
      POSTGRES_DB: locpartage
      POSTGRES_USER: locpartage
      POSTGRES_PASSWORD: locpartage
    ports:
      - "5432:5432"
    volumes:
      - locpartage_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U locpartage -d locpartage"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  locpartage_pg_data:
