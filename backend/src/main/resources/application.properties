spring.application.name=locpartage
server.port=8080

spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# PostgreSQL - dev (override via env si besoin)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/locpartage}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USER:locpartage}
spring.datasource.password=${DB_PASSWORD:locpartage}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# JWT
app.jwt.secret=${JWT_SECRET:change-me-in-prod-please-use-a-very-long-random-secret-key-256bits}
app.jwt.expiration-ms=86400000

# CORS
app.cors.allowed-origins=http://localhost:4200

# Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=./uploads
